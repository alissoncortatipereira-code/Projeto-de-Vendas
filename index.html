<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LojaTech</title>
    
 
    <link rel="shortcut icon" href="favicon.png" type="image/x-icon">

    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            background-color: #f8f9fa;
            color: #333;
        }
        header {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            color: white;
            padding: 2rem 0;
            text-align: center;
        }
        h1 {
            font-size: 2.8rem;
        }
        nav {
            background: #34495e;
            padding: 1rem 0;
        }
        nav ul {
            display: flex;
            justify-content: center;
            list-style: none;
            gap: 2rem;
        }
        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }
        nav a:hover {
            color: #3498db;
        }
        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        #produtos {
            margin-bottom: 4rem;
        }
        .produtos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }
        .produto {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .produto:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }
        .produto img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .produto-content {
            padding: 1.2rem;
        }
        .produto h3 {
            margin-bottom: 0.5rem;
            color: #2c3e50;
        }
        .preco {
            font-size: 1.5rem;
            font-weight: bold;
            color: #27ae60;
            margin: 0.8rem 0;
        }
        .descricao {
            font-size: 0.95rem;
            color: #555;
            margin-bottom: 1.2rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .btn-comprar {
            display: inline-block;
            background: #e74c3c;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn-comprar:hover {
            background: #c0392b;
        }
        section h2 {
            margin-bottom: 1.5rem;
            color: #2c3e50;
            border-bottom: 3px solid #3498db;
            padding-bottom: 0.5rem;
        }
        footer {
            text-align: center;
            padding: 2rem;
            background: #2c3e50;
            color: white;
            margin-top: 3rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>LojaTech</h1>
    </header>

    <nav>
        <ul>
            <li><a href="#produtos">Produtos</a></li>
            <li><a href="#sobre">Sobre</a></li>
            <li><a href="#contato">Contato</a></li>
        </ul>
    </nav>

    <main>
        <section id="produtos">
            <h2>Produtos em Destaque</h2>
            <div class="produtos-grid">

                <div class="produto">
                    <img src="https://static.wixstatic.com/media/71a6c2_025b6844a84d4792a5063331d05f8e0b~mv2.png/v1/fill/w_441,h_543,al_c,lg_1,q_85,enc_avif,quality_auto/fidd-separador.png" alt="NFIDD RGB" title="FIDD RGB">
                    <div class="produto-content">
                        <h3>FIDD RGB</h3>
                        <p class="preco">R$ 702,84</p>
                        <p class="descricao">Teclado mecânico 60% com Switch Pink Magnético K683BW-RGB PT.</p>
                        <a href="https://www.amazon.com.br/Teclado-Magn%C3%A9tico-Redragon-Branco-K683BW-RGB/dp/B0DLRSNCZZ/..." target="_blank" class="btn-comprar">Comprar Agora</a>
                    </div>
                </div>


            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 LojaTech - Todos os direitos reservados.</p>
    </footer>

</body>
</html>
